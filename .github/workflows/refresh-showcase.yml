name: Refresh Showcase

# Runs weekly to keep the portfolio section current.
# Trigger manually via workflow_dispatch for an on-demand refresh.
# With the SHOWCASE_TOKEN secret set (a PAT with read access to the repos), the
# "Collect activity" step self-updates the Recently shipped section from the
# GitHub API. Without it, that step no-ops and the committed activity.json is
# reused — everything else still regenerates.

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect activity
        env:
          SHOWCASE_TOKEN: ${{ secrets.SHOWCASE_TOKEN }}
        run: node scripts/collect-activity.mjs

      - name: Generate showcase
        env:
          SHOWCASE_TOKEN: ${{ secrets.SHOWCASE_TOKEN }}
        run: node scripts/generate-showcase.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/activity.json assets
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: refresh showcase [skip ci]"
          git push
